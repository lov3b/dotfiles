set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ",xterm-256color:Tc"

set -g prefix C-a
set -g prefix2 C-b
unbind C-b
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
setw -g renumber-windows on

set -g mouse on
set -g focus-events on
set -g history-limit 50000
set -g escape-time 10
set -g repeat-time 600

bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display-message "tmux: reloaded"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g set-clipboard on

set -g @color_bg "#2a123a"
set -g @color_fg "#e6e6e6"
set -g @color_sub "#9aa3b2"
set -g @color_muted "#6b7280"
set -g @color_accent "#b48ef7"
set -g @color_warn "#f59e0b"

set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#{@color_bg},fg=#{@color_fg}"
setw -g window-status-current-style "fg=#{@color_bg},bg=#{@color_accent},bold"
