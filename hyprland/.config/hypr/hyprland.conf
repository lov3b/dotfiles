autogenerated = 0

source = ~/.config/hypr/theme.conf

# Monitors
monitor=,preferred,auto,auto

# ---------------
# Programs / variables
# ---------------
$terminal    = ghostty
$fileManager = thunar
$browser     = firefox
$mediaPlayer = mpv
$menu        = rofi -show drun -theme ~/.config/rofi/theme.rasi

$mainMod = SUPER
$left  = h
$down  = j
$up    = k
$right = l


# ---------------
# Autostart
# ---------------
exec-once = nm-applet
exec-once = waybar
exec = ~/.local/bin/hyprpaper-random
exec-once = dunst
exec-once = ~/.local/bin/mouse-dpi --apply
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE
exec-once = ~/.local/bin/make-gtk3-bookmarks

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
bind = $mainMod, C, exec, cliphist list | rofi -dmenu  -theme ~/.config/rofi/theme.rasi -i -p "Clipboard" | cliphist decode | wl-copy

# Idle + lock (recommended replacement for xss-lock+i3lock)
# Requires: hypridle + hyprlock
exec-once = hypridle

# Polkit agent
exec-once = ~/.local/bin/polkit-agent


# ---------------
# Environment
# ---------------
# Cursor sizes
env = XCURSOR_THEME,breeze_cursors
env = HYPRCURSOR_THEME,breeze_cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Wayland hints for common toolkits/apps
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,kde
env = QT_STYLE_OVERRIDE,kvantum
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1

# Dead keys
env = GTK_IM_MODULE,simple

# Electron / Chromium / Discord / Spotify etc.
# (Many distros don’t require this anymore, but it helps on stubborn apps.)
env = NIXOS_OZONE_WL,1
env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto


# ============================================================
# Look & Feel
# ============================================================
general {
    gaps_in = 7
    gaps_out = 7

    border_size = 2
    col.active_border = $mauve $blue 45deg
    col.inactive_border = $overlay0

    # i3-like: keep resize intentional
    resize_on_border = false

    # Usually keep tearing off unless you *need* it for specific games.
    allow_tearing = false

    layout = master
}

decoration {
    rounding = 5

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 6
        render_power = 3
        color = $crust
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.18
    }
}

animations {
    enabled = no
}

dwindle {
    pseudotile = true
    preserve_split = true
}

group {
    insert_after_current = true
    col.border_active = $mauve $blue 45deg
    col.border_inactive = $overlay0
    col.border_locked_active = $red $peach 45deg
    col.border_locked_inactive = $overlay0

    groupbar {
        enabled = true
        gradients = false
        font_size = 11
        font_weight_active = bold
        font_weight_inactive = normal
        height = 26
        indicator_height = 0
        gaps_in = 2
        gaps_out = 3
        rounding = 10
        gradient_rounding = 10
        #text_padding = 10
        text_offset = 0
        render_titles = true

        col.active = $blue
        col.inactive = $surface1
        col.locked_active = $red
        col.locked_inactive = $overlay0
        text_color = $crust
        text_color_inactive = $text
        text_color_locked_active = $crust
        text_color_locked_inactive = $text
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 1
}

# ============================================================
# Input
# ============================================================
input {
    kb_layout = se
    kb_options = ctrl:swapcaps

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
        tap-to-click = true
        disable_while_typing = true
    }
}

#gestures { workspace_swipe = false }

# ============================================================
# Core Keybinds 
# ============================================================

# Core apps
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, D,      exec, $menu
bind = $mainMod, P,      exec, ~/.local/bin/mouse-dpi

# Kill / exit
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, L, exec, pidof hyprlock >/dev/null || hyprlock
bind = $mainMod,       M, exit

# Reload config
bind = $mainMod SHIFT, C, exec, hyprctl reload

# ============================================================
# Focus 
#  i3 style
# ============================================================
bind = $mainMod, $left,  movefocus, l
bind = $mainMod, $down,  movefocus, d
bind = $mainMod, $up,    movefocus, u
bind = $mainMod, $right, movefocus, r

bind = $mainMod, Left,  movefocus, l
bind = $mainMod, Down,  movefocus, d
bind = $mainMod, Up,    movefocus, u
bind = $mainMod, Right, movefocus, r

# ============================================================
# Move window 
#  Shift + direction
# ============================================================
bind = $mainMod SHIFT, $left,  movewindow, l
bind = $mainMod SHIFT, $down,  movewindow, d
bind = $mainMod SHIFT, $up,    movewindow, u
bind = $mainMod SHIFT, $right, movewindow, r

bind = $mainMod SHIFT, Left,  movewindow, l
bind = $mainMod SHIFT, Down,  movewindow, d
bind = $mainMod SHIFT, Up,    movewindow, u
bind = $mainMod SHIFT, Right, movewindow, r

# ============================================================
# Layout controls
# ============================================================

# Split orientation toggle (closest to i3’s split v/h vibe)
bind = $mainMod, V, togglesplit

# Fullscreen
bind = $mainMod, F, fullscreen

# Floating toggle
bind = $mainMod SHIFT, space, togglefloating

# Focus “parent-ish” / master-ish
# In dwindle, this is often good enough as an i3 "focus parent" reflex:
bind = $mainMod, A, layoutmsg, focusmaster

# Grouping (Hyprland’s “tabbed/stacked-ish” superpower)
# - Toggle group on a window
# - Cycle within group
bind = $mainMod,       G, togglegroup
bind = $mainMod,       Tab, changegroupactive, f
bind = $mainMod SHIFT, Tab, changegroupactive, b

# ============================================================
# Resize mode 
# i3-like
# ============================================================
bind = $mainMod, R, submap, resize

submap = resize
bind = , $left,  resizeactive, -20 0
bind = , $right, resizeactive,  20 0
bind = , $up,    resizeactive,  0 -20
bind = , $down,  resizeactive,  0  20
bind = , Left,   resizeactive, -20 0
bind = , Right,  resizeactive,  20 0
bind = , Up,     resizeactive,  0 -20
bind = , Down,   resizeactive,  0  20

bind = , Escape, submap, reset
bind = , Return, submap, reset
submap = reset

# ============================================================
# Workspaces 
# 1..10 + move container
# ============================================================
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad equivalent (special workspace)
bind = $mainMod SHIFT, minus, movetoworkspace, special:magic
bind = $mainMod,       minus, togglespecialworkspace, magic

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ============================================================
# Program shortcuts (your i3 ones, Wayland-friendly)
# ============================================================
bind = $mainMod CONTROL, S, exec, ~/.local/bin/app-launch spotify -- flatpak run com.spotify.Client
bind = $mainMod CONTROL, D, exec, ~/.local/bin/app-launch ~/.local/bin/discord -- flatpak run com.discordapp.Discord
bind = $mainMod CONTROL, W, exec, $browser
bind = $mainMod CONTROL, E, exec, $fileManager
bind = $mainMod SHIFT,   S, exec, steam
bind = $mainMod CONTROL, T, exec, ~/.local/bin/app-launch Telegram -- telegram-desktop -- telegram -- flatpak run org.telegram.desktop
bind = ALT CONTROL,      M, exec, $mediaPlayer --player-operation-mode=pseudo-gui --keep-open=yes
bind = $mainMod ALT,     M, exec, $mediaPlayer --player-operation-mode=pseudo-gui --keep-open=yes
bind = $mainMod CONTROL, B, exec, ~/.local/bin/app-launch bitwarden -- ~/.local/bin/bitwarden-desktop -- flatpak run com.bitwarden.desktop

# ============================================================
# Screenshots
# ============================================================
bind = , Print,               exec, ~/.local/bin/screenshot area
bind = , F8,                  exec, ~/.local/bin/screenshot area
bind = $mainMod, F8,          exec, ~/.local/bin/screenshot output
bind = $mainMod, Print,       exec, ~/.local/bin/screenshot output
bind = $mainMod SHIFT, Print, exec, ~/.local/bin/screenshot active
bind = $mainMod SHIFT, F8,    exec, ~/.local/bin/screenshot active

# ============================================================
# Media keys
# ============================================================
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +10%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -10%
bind = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioPlay,        exec, playerctl play-pause
bind = , XF86AudioNext,        exec, playerctl next
bind = , XF86AudioPrev,        exec, playerctl previous

# Brightness
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
